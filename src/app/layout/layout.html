<a href="#main-content" class="skip-link">Aller au contenu principal</a>

<div class="layout" [class.layout--collapsed]="sidebarCollapsed()">

  <!-- ═══ Sidebar ═══ -->
  <aside class="sidebar" role="navigation" aria-label="Navigation principale">

    <div class="sidebar__header">
      <div class="sidebar__logo" aria-hidden="true">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="32" height="32" rx="8" fill="#6366f1"/>
          <path d="M8 24L16 8l8 16H8z" fill="white" opacity=".9"/>
          <circle cx="16" cy="16" r="4" fill="white"/>
        </svg>
      </div>
      <span class="sidebar__brand">DejTech</span>
    </div>

    <nav class="sidebar__nav" aria-label="Menu principal">
      @for (item of navItems; track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="sidebar__link--active"
          class="sidebar__link"
          [attr.title]="sidebarCollapsed() ? item.label : null"
          [attr.aria-current]="null"
        >
          <span class="sidebar__link-icon" aria-hidden="true">
            <app-icon [name]="item.icon" />
          </span>
          <span class="sidebar__link-text">{{ item.label }}</span>
        </a>
      }
    </nav>

    <div class="sidebar__footer">
      <div class="sidebar__user">
        <div class="sidebar__avatar" aria-hidden="true">AD</div>
        <div class="sidebar__user-info">
          <span class="sidebar__user-name">Admin Demo</span>
          <span class="sidebar__user-role">Administrateur</span>
        </div>
      </div>
    </div>

  </aside>

  <!-- ═══ Main ═══ -->
  <div class="main">

    <header class="header" role="banner">
      <div class="header__left">
        <button
          class="header__toggle"
          type="button"
          (click)="toggleSidebar()"
          [attr.aria-expanded]="!sidebarCollapsed()"
          aria-label="Basculer la navigation latérale"
        >
          <app-icon name="menu" />
        </button>
      </div>

      <div class="header__search" role="search">
        <span class="header__search-icon" aria-hidden="true">
          <app-icon name="search" />
        </span>
        <input
          type="search"
          placeholder="Rechercher…"
          aria-label="Rechercher dans l'application"
          class="header__search-input"
        />
      </div>

      <div class="header__right">
        <button class="header__icon-btn" type="button" aria-label="Notifications — 3 non lues">
          <app-icon name="bell" />
          <span class="header__badge" aria-hidden="true">3</span>
        </button>
        <!-- IA Chat toggle -->
        <button
          class="header__icon-btn header__ai-btn"
          [class.header__ai-btn--active]="chatOpen()"
          type="button"
          (click)="toggleChat()"
          [attr.aria-expanded]="chatOpen()"
          aria-label="Ouvrir l'assistant IA"
          aria-controls="ai-chat-panel"
        >
          <app-icon name="sparkles" />
        </button>
        <button class="header__avatar-btn" type="button" aria-label="Menu du compte utilisateur">
          AD
        </button>
      </div>
    </header>

    <main class="content" id="main-content" tabindex="-1">
      <router-outlet />
    </main>

    <!-- ── AI Chat Panel ── -->
    <aside
      id="ai-chat-panel"
      class="chat-panel"
      [class.chat-panel--open]="chatOpen()"
      aria-label="Assistant IA DejTech"
      [attr.aria-hidden]="!chatOpen()"
    >
      <div class="chat-panel__header">
        <div class="chat-panel__title">
          <span class="chat-panel__title-icon" aria-hidden="true">
            <app-icon name="sparkles" />
          </span>
          <h2>Assistant IA</h2>
          <span class="chat-panel__badge">GPT-4o</span>
        </div>
        <button
          class="chat-panel__close"
          type="button"
          (click)="toggleChat()"
          aria-label="Fermer l'assistant IA"
        >
          <app-icon name="x" />
        </button>
      </div>
      @if (chatOpen()) {
        <app-ai-chat />
      }
    </aside>

  </div>
</div>
